# Vaillant Arotherm Plus 5kW at 6 Rhodes Avenue, London N22 7UT

[emoncms]
base_url = "https://emoncms.org"

# Default sync start: 2024-10-22 00:00 UTC (when this installation began logging)
default_sync_start_ms = 1_729_555_200_000

## Feed definitions.
## `column` is the analysis DataFrame column name (omit for feeds not used in analysis).
[[emoncms.feeds]]
id = "503093"
name = "outside_temp"
column = "outside_t"

[[emoncms.feeds]]
id = "503094"
name = "elec_power"
column = "elec_w"

[[emoncms.feeds]]
