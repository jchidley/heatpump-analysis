name = "dhw_flag"

# --- Arotherm 5kW operating thresholds ---
[thresholds]
# UK standard base temperature for heating degree days.
# Tb = design indoor temp (18.5°C) − average internal gains (3°C) = 15.5°C.
hdd_base_temp_c = 15.5

# Minimum electrical power (W) to consider the compressor running.
elec_running_w = 50.0

# Flow rate (L/min) above which we enter DHW state (diverter valve to cylinder).
# The gap between heating (14.3–14.5) and steady DHW (16.5+) is near-empty.
dhw_enter_flow_rate = 16.0

# Flow rate (L/min) below which we exit DHW state back to heating.
# Provides hysteresis across the 14.5–16.0 transition zone (diverter moving).
dhw_exit_flow_rate = 15.0

# DT threshold (°C) below which we consider the system to be in defrost.
# During defrost the return is warmer than the flow (heat extracted from water).
defrost_dt_threshold = -0.5

# --- House thermal properties ---
[house]
# Heat Transfer Coefficient (W/°C) — total heat loss per degree of
# temperature difference between inside and outside.
# From regression on gas consumption data (EGWU weather station).
htc_w_per_c = 261.0

# Floor area in m².
floor_area_m2 = 180.0

# Design indoor temperature (°C) — whole-house average.
design_indoor_temp_c = 17.0

# Design outdoor temperature (°C) — coldest expected.
design_outdoor_temp_c = -2.0

# Base temperature (°C) from gas consumption regression.
# Below this outside temp, heating is needed.
# Note: HP data suggests effective base ~12°C — difference may be due to
# boiler inefficiency inflating apparent gas-era demand, or heat pump
# providing less waste heat than gas boiler.
base_temp_gas_era_c = 17.0

# Design heat loss at design conditions (W).
# = HTC × (design_indoor - design_outdoor) = 261 × 19 = 4,959W
design_heat_loss_w = 4962.0

# Ventilation heat loss at design conditions (W).
ventilation_loss_w = 3762.0

# Figure of merit: kWh per m² per year (pre-insulation).
# AECB retrofit standard target is < 50.
kwh_per_m2_year = 70.3

# kWh per heating degree day (from gas data, base 17°C).
kwh_per_hdd = 6.27

# Construction notes.
construction = """\
Solid brick construction including internal walls. \
Top floor (Aldora, Elvina, Shower) built to 2010 standards. \
Solid wall insulation not yet installed (planned)."""

