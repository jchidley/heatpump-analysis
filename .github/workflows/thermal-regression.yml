name: thermal-regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "model/thermal-config.toml"
      - "artifacts/thermal/**"
      - "scripts/thermal-regression-ci.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/thermal-regression.yml"
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "model/thermal-config.toml"
      - "artifacts/thermal/**"
      - "scripts/thermal-regression-ci.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/thermal-regression.yml"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Thermal artifact regression gate
        run: bash scripts/thermal-regression-ci.sh
